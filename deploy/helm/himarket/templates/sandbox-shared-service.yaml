{{- if .Values.sandbox.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: sandbox-shared
  labels:
    app: sandbox-shared
spec:
  type: {{ .Values.server.service.type }}
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: sandbox-shared
{{- end }}
