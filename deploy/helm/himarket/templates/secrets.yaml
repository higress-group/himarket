{{- $existingMysqlSecret := (lookup "v1" "Secret" .Release.Namespace "mysql-secret") }}
{{- $existingServerSecret := (lookup "v1" "Secret" .Release.Namespace "himarket-server-secret") }}
{{- $rootPassword := "" }}
{{- $userPassword := "" }}
{{- $jwtSecret := "" }}

# ── MySQL 密码 ──
{{- if and $existingMysqlSecret $existingMysqlSecret.data }}
  {{- if index $existingMysqlSecret.data "MYSQL_ROOT_PASSWORD" }}
    {{- $rootPassword = (index $existingMysqlSecret.data "MYSQL_ROOT_PASSWORD" | b64dec) }}
  {{- end }}
  {{- if index $existingMysqlSecret.data "MYSQL_PASSWORD" }}
    {{- $userPassword = (index $existingMysqlSecret.data "MYSQL_PASSWORD" | b64dec) }}
  {{- end }}
{{- end }}
{{- if or (not $existingMysqlSecret) (not $existingMysqlSecret.data) (not (index $existingMysqlSecret.data "MYSQL_ROOT_PASSWORD")) }}
  {{- if .Values.mysql.auth.rootPassword }}
    {{- $rootPassword = .Values.mysql.auth.rootPassword }}
  {{- else }}
    {{- $rootPassword = randAlphaNum 16 }}
  {{- end }}
  {{- if .Values.mysql.auth.password }}
    {{- $userPassword = .Values.mysql.auth.password }}
  {{- else }}
    {{- $userPassword = randAlphaNum 16 }}
  {{- end }}
{{- end }}

# ── JWT Secret ──
{{- if and $existingServerSecret $existingServerSecret.data (index $existingServerSecret.data "JWT_SECRET") }}
  {{- $jwtSecret = (index $existingServerSecret.data "JWT_SECRET" | b64dec) }}
{{- else }}
  {{- if .Values.server.jwtSecret }}
    {{- $jwtSecret = .Values.server.jwtSecret }}
  {{- else }}
    {{- $jwtSecret = randAlphaNum 32 }}
  {{- end }}
{{- end }}

---
# MySQL Secret: 数据库凭据
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: {{ $rootPassword | quote }}
  MYSQL_ROOT_HOST: "%"
  MYSQL_DATABASE: {{ .Values.mysql.auth.database | quote }}
  MYSQL_USER: {{ .Values.mysql.auth.username | quote }}
  MYSQL_PASSWORD: {{ $userPassword | quote }}

---
# Himarket Server Secret: 应用敏感配置（DB 连接 + JWT）
apiVersion: v1
kind: Secret
metadata:
  name: himarket-server-secret
  labels:
    app: himarket-server
type: Opaque
stringData:
  DB_HOST: "mysql-headless-svc"
  DB_PORT: "3306"
  DB_NAME: {{ .Values.mysql.auth.database | quote }}
  DB_USERNAME: {{ .Values.mysql.auth.username | quote }}
  DB_PASSWORD: {{ $userPassword | quote }}
  JWT_SECRET: {{ $jwtSecret | quote }}
