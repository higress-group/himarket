apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "himarket.serviceAccountName" . }}
---
# 授权 himarket ServiceAccount 在 default namespace 管理沙箱 Pod/PVC/Service
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "himarket.serviceAccountName" . }}-sandbox-binding
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: {{ include "himarket.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}